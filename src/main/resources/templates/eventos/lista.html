<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-4">

    <h1 class="mb-4">Eventos</h1>

    <div sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">
        <a th:href="@{/eventos/nuevo}" class="btn btn-primary mb-3">Nuevo Evento</a>
    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <th sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">ID</th>

            <th>Nombre</th>
            <th>Descripción</th>
            <th>Fecha</th>
            <th>Capacidad</th>

            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <th sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">Activo</th>

            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <th sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="e : ${eventos}">

            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <td sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')" th:text="${e.id}"></td>

            <td th:text="${e.nombre}"></td>
            <td th:text="${e.descripcion}"></td>
            <td th:text="${e.fecha}"></td>
            <td th:text="${e.capacidad}"></td>

            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <td sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')" th:text="${e.activo}"></td>

            <!-- SOLO ADMIN Y ORGANIZADOR -->
            <td sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">

                <a th:href="@{/eventos/editar/{id}(id=${e.id})}" 
                   class="btn btn-warning btn-sm">Editar</a>

                <a th:href="@{/eventos/eliminar/{id}(id=${e.id})}" 
                   class="btn btn-danger btn-sm">Eliminar</a>

            </td>

        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
