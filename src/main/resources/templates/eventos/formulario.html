<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 th:text="${evento.id == null} ? 'Nuevo Evento' : 'Editar Evento'"></h2>

    <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <input type="text" th:field="*{descripcion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Fecha</label>
            <input type="date" th:field="*{fecha}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Capacidad</label>
            <input type="number" th:field="*{capacidad}" class="form-control" required>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" th:field="*{activo}" class="form-check-input">
            <label class="form-check-label">Activo</label>
        </div>

        <button class="btn btn-success">Guardar</button>
        <a th:href="@{/eventos}" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
