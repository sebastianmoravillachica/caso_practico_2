<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand">EventosApp</a>

        <ul class="navbar-nav me-auto">

            <!-- ADMIN -->
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
            </li>

            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/roles}">Roles</a>
            </li>

            <!-- TODOS -->
            <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')">
                <a class="nav-link" th:href="@{/eventos}">Eventos</a>
            </li>

        </ul>

        <!-- LOGOUT -->
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-danger">Cerrar sesión</button>
        </form>

    </div>
</nav>

</body>
</html>
