<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Roles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-4">

    <h1>Roles</h1>

    <div sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/roles/nuevo}" class="btn btn-primary mb-3">Nuevo Rol</a>
    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${roles}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.nombre}"></td>

            <td>
                <span sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/roles/editar/{id}(id=${r.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/roles/eliminar/{id}(id=${r.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                </span>

                <span sec:authorize="!hasRole('ADMIN')" class="text-muted">
                    Solo lectura
                </span>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
