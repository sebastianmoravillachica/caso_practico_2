<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-4">

    <h2 th:text="${usuario.id == null} ? 'Nuevo Usuario' : 'Editar Usuario'"></h2>

    <form th:action="@{/usuarios/guardar}" method="post">

        <input type="hidden" name="id" th:value="${usuario.id}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" th:value="${usuario.nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" th:value="${usuario.email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Rol</label>
            <select name="rol" class="form-control">
                <option th:each="r : ${roles}"
                        th:value="${r.id}"
                        th:text="${r.nombre}"
                        th:selected="${usuario.rol != null} ? ${r.id} == ${usuario.rol.id} : false">
                </option>
            </select>
        </div>

        <button class="btn btn-success">Guardar</button>
        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
